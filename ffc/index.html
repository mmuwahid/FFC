<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>FFC</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="/ffc-logo-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/ffc-logo-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FFC" />
    <meta name="theme-color" content="#0e1826" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#e63349" media="(prefers-color-scheme: light)" />
    <meta name="description" content="The official Home of the FFC." />

    <!-- Open Graph (WhatsApp / iMessage / Slack link previews) -->
    <!-- ?v=2 cache-buster on og:image so WhatsApp's scrape cache re-fetches the cream-bg refresh (S038). -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FFC" />
    <meta property="og:description" content="The official Home of the FFC." />
    <meta property="og:image" content="/og-image.png?v=2" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="FFC" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:description" content="The official Home of the FFC." />
    <meta name="twitter:image" content="/og-image.png?v=2" />

    <!-- Inline splash: painted immediately, hidden once React mounts.
         Kills the cold-start white flash on cold loads. -->
    <style>
      html, body { margin: 0; background: #0e1826; color: #e7ecf5;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
      #ffc-splash {
        position: fixed; inset: 0;
        display: grid; place-items: center;
        background: #0e1826;
        z-index: 9999;
        transition: opacity 240ms ease-out;
      }
      #ffc-splash.hide { opacity: 0; pointer-events: none; }
      #ffc-splash-crest {
        width: 128px; height: 128px;
        object-fit: contain;
        filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.4));
      }
    </style>
  </head>
  <body>
    <div id="ffc-splash" aria-hidden="true">
      <img id="ffc-splash-crest" src="/ffc-logo-192.png" alt="" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
